server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — always fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the backend container (see docker-compose.yml)
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
